services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trading
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_ENABLED: "false"
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trading
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_ENABLED: "true"
      AUTO_CREATE_TABLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run python -m app.workers.runner"
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
